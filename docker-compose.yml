version: '3'

services:
  tg-bot:
    container_name: flibusta-tg-bot
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    volumes:
      - ./books:/srv/books
      - ./logs:/srv/logs
      - ./data:/srv/data
      - ./downloads:/srv/downloads
      # Раскомментируйте для hot-reload при разработке:
      # - ./src:/srv/src
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python src/srv.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
