services:
  tg-bot:
    container_name: flibusta-tg-bot
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./books:/srv/books
      - ./logs:/srv/logs
      - ./data:/srv/data
      - ./downloads:/srv/downloads
    # pgrep is not in python:*-slim; verify PID 1 is still the bot (CMD: python src/srv.py)
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys; sys.exit(0 if b'srv.py' in open('/proc/1/cmdline', 'rb').read() else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  web:
    container_name: flibusta-web
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    restart: always
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - ./books:/srv/books
      - ./logs:/srv/logs
      - ./data:/srv/data
      - ./downloads:/srv/downloads
    depends_on:
      tg-bot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
